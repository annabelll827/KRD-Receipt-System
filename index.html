<!DOCTYPE html>
<html lang="ku" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KRD Receipt System</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<div class="receipt">


<header>
    <h1>KRD Receipt System</h1>
</header>


<!-- زانیاری کڕیار -->

<div class="customer-info">

    <input 
    id="customerName" 
    placeholder="ناوی کڕیار">


    <input 
    id="customerPhone" 
    type="tel" 
    placeholder="ژمارەی تەلەفۆن">

</div>



<!-- تێبینی -->

<textarea 
id="notes" 
placeholder="تێبینی">
</textarea>




<!-- زانیاری وەسڵ -->

<div class="receipt-info">

    <input 
    id="receiptNumber" 
    placeholder="ژمارەی وەسڵ">


    <input 
    id="receiptDate" 
    type="text" 
    placeholder="YYYY/MM/DD">

</div>




<button id="addProductBtn" class="add-btn">

    ➕ زیادکردنی کاڵا

</button>



<div id="productsContainer"></div>





<div class="discount-box">

    <label>
        بڕی داشکاندن
    </label>


    <input 
    id="discount" 
    type="number" 
    placeholder="0">

</div>





<!-- مێژووی وەسڵ -->

<button id="historyBtn" class="history-btn">

    📜 مێژووی وەسڵەکان

</button>



<div 
id="historyModal" 
class="history-modal" 
style="display:none;">


    <div class="history-content">


        <h2>
            📜 مێژووی وەسڵەکان
        </h2>


        <div id="historyList"></div>


        <button onclick="closeHistory()">

            داخستن

        </button>


    </div>


</div>





<div class="bottom-section">


    <button id="createReceipt">

        🖨️ دروستکردنی وەسڵ

    </button>



    <div class="grand-total">


        کۆی گشتی:

        <span id="grandTotal">
            0
        </span>

        IQD


    </div>



</div>



</div>



<script src="script.js"></script>


</body>

</html>
