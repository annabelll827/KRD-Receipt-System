<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سیستەمی وەسڵ - KRD Receipt System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card" id="receiptCard">
  <div class="top-row">
    <button class="reset-btn" onclick="resetForm()">گەڕانەوە</button>
    <h1>KRD Receipt System</h1>
  </div>

  <div class="row2">
    <input type="tel" id="phone" placeholder="ژمارەی تەلەفۆن">
    <input type="text" id="customer" placeholder="ناوی کڕیار">
  </div>

  <textarea id="notes" placeholder="تێبینی"></textarea>

  <div class="row2">
    <input type="text" id="date" placeholder="YYYY/MM/DD">
    <input type="text" id="receiptNo" placeholder="ژمارەی وەسڵ">
  </div>

  <button class="add-btn" onclick="addItem()">＋ زیادکردنی کاڵا</button>

  <div id="itemsContainer">
    <p class="empty-msg" id="emptyMsg">هیچ کاڵایەک زیاد نەکراوە</p>
  </div>

  <div class="discount-label">بڕی داشکاندن</div>
  <input type="number" id="discount" placeholder="0" oninput="calculateTotal()">

  <div class="bottom-btns">
    <button onclick="shareReceipt()">📤 ناردن بۆ مێژووی وەسڵەکان</button>
    <button onclick="window.print()">🖨️ دروستکردنی وەسڵ</button>
  </div>

  <div class="total-line">کۆی گشتی: <span id="grandTotal">IQD 0</span></div>
</div>

<script src="script.js"></script>
</body>
</html>
