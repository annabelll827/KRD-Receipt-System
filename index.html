<!DOCTYPE html>
<html lang="ku" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KRD Receipt System</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<div class="receipt">

<header>
    <h1>KRD Receipt System</h1>
</header>


<div class="customer-info">

    <input id="customer" placeholder="ناوی کڕیار">

    <input id="phone" type="tel" placeholder="ژمارەی تەلەفون">

</div>


<textarea id="notes" placeholder="تێبینی"></textarea>

<div class="receipt-info">

    <input id="receiptNumber" placeholder="ژمارەی وەسڵ">

    <input id="receiptDate" type="text" placeholder="YYYY/MM/DD">

</div>



<button id="addProductBtn" class="add-btn">
    ➕ زیادکردنی کاڵا
</button>



<div id="productsContainer"></div>



<div class="discount-box">

    <label>بڕی داشکاندن</label>

    <input id="discount" type="number" placeholder="0">

</div>



<div class="bottom-section">

    <button id="createReceipt">
        دروستکردنی وەسڵ
    </button>


    <div class="grand-total">

        کۆی گشتی:
        <span id="grandTotal">0</span> IQD

    </div>


</div>


</div>



<script src="script.js"></script>

</body>

</html>
