<!DOCTYPE html>
<html lang="ku" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KRD Receipt System</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<!-- Header -->
<header class="header">

<button id="dashboardBtn" class="back-btn">
⬅️ گەڕانەوە
</button>

<h1>KRD Receipt System</h1>

</header>

<!-- Customer -->

<section class="customer-section">

<div class="grid-2">

<input
id="customerName"
type="text"
placeholder="👤 ناوی کڕیار">

<input
id="customerPhone"
type="tel"
placeholder="📱 ژمارەی تەلەفۆن">

</div>

<textarea
id="notes"
rows="3"
placeholder="📝 تێبینی"></textarea>

<div class="grid-2">

<input
id="receiptNumber"
type="text"
placeholder="🧾 ژمارەی وەسڵ">

<input
id="receiptDate"
type="text"
placeholder="📅 بەروار">

</div>

</section>

<!-- Products -->

<section class="products-section">

<div class="section-title">

<h2>🛒 زیادکردنی کاڵا</h2>

<button id="addProductBtn">
➕ زیادکردنی کاڵا
</button>

</div>

<div id="productsContainer"></div>

</section>

<!-- Total -->

<section class="total-section">

<label>
💸 بڕی داشکاندن
</label>

<input
id="discount"
type="number"
value="0">

<h2>

💰 کۆی گشتی :

<span id="grandTotal">
0
</span>

IQD

</h2>

</section>

<!-- Buttons -->

<section class="actions">

<button
id="createReceipt"
class="print-btn">

🖨️ ناردن بۆ وەسڵ

</button>

<button
id="historyBtn"
class="history-btn">

📜 ناردن بۆ مێژووی وەسڵ

</button>

</section>

<!-- History -->

<div
id="historyModal"
class="modal">

<div class="modal-content">

<button
id="closeHistoryBtn">

✖

</button>

<h2>
📜 مێژووی وەسڵەکان
</h2>

<div id="paidHistory"></div>

<hr>

<div id="debtHistory"></div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
