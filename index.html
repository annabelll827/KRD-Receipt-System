‏<!DOCTYPE html>
‏<html lang="ku" dir="rtl">

‏<head>
‏    <meta charset="UTF-8">
‏    <meta name="viewport" content="width=device-width, initial-scale=1.0">
‏    <title>KRD Receipt System</title>

‏    <link rel="stylesheet" href="style.css">

‏    <link rel="preconnect" href="https://fonts.googleapis.com">
‏    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

‏    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;700&display=swap"
‏        rel="stylesheet">
‏</head>

‏<body>

‏<div class="container">

‏    <!-- Header -->

‏    <div class="header">

‏        <button id="dashboardBtn" class="back-btn">
            گەڕانەوە
‏        </button>

‏        <h1>KRD Receipt System</h1>

‏    </div>

‏    <!-- Customer -->

‏    <div class="row">

‏        <input
‏            id="customerName"
‏            type="text"
‏            placeholder="ناوی کڕیار">

‏        <input
‏            id="customerPhone"
‏            type="text"
‏            placeholder="ژمارەی تەلەفۆن">

‏    </div>

‏    <!-- Notes -->

‏    <textarea
‏        id="notes"
‏        placeholder="تێبینی"></textarea>

‏    <!-- Receipt -->

‏    <div class="row">

‏        <input
‏            id="receiptNumber"
‏            type="text"
‏            placeholder="ژمارەی وەسڵ">

‏        <input
‏            id="receiptDate"
‏            type="date">

‏    </div>

‏    <!-- Add Product -->

‏    <button
‏        id="addProductBtn"
‏        class="add-btn">

        ➕ زیادکردنی کاڵا

‏    </button>

‏    <!-- Products -->

‏    <div id="productsContainer"></div>

‏    <!-- Discount -->

‏    <div class="discount-box">

‏        <label>
            بڕی داشکاندن
‏        </label>

‏        <input
    id="discount"
    type="number"
    value="0"
    placeholder="0">
           <!-- Settings Menu -->

<div id="settingsMenu" class="settings-menu">

    <button id="darkModeBtn">
        🌙 Dark Mode
    </button>

    <select id="language">

        <option value="ku">کوردی</option>

        <option value="ar">العربية</option>

        <option value="en">English</option>

    </select>

    <button id="reportBtn">
        📧 ناردنی ڕاپۆرت
    </button>

</div>

<!-- Floating Settings Button -->

<button id="settingsBtn" class="settings-btn">
    ⚙️
</button>

<!-- JavaScript -->

<script src="script.js"></script>

</body>
</html>
